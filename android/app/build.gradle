plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

// Блокируем плагин (оставлено как было)
configurations.all {
    exclude group: 'io.flutter', module: 'flutter_plugin_android_lifecycle'
}

android {
    namespace "com.george_samusevich.soul_pair"

    compileSdk 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    signingConfigs {
        debug {
            storeFile file("${System.getProperty('user.home')}/.android/new_clean.keystore")
            storePassword "android"
            keyAlias "newkey"
            keyPassword "android"
        }
        // Можно добавить release, если потребуется
    }

    defaultConfig {
        applicationId "com.george_samusevich.soul_pair"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug  // или release, если настроите
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation 'androidx.core:core:1.10.1'
}